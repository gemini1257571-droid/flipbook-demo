    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const flipBook = document.getElementById('flipbook');
            flipBook.style.display = 'block';

            const pageFlip = new St.PageFlip(flipBook, {
                width: 1200, 
                height: 800, 
                size: "stretch", 
                minWidth: 300,
                maxWidth: 1200,
                minHeight: 400,
                maxHeight: 800,
                maxShadowOpacity: 0.5,
                showCover: true,
                mobileScrollSupport: true 
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // Yahan sound setup ho raha hai
            const flipSound = new Audio('flip.wav');
            flipSound.preload = 'auto'; // Sound ko pehle se load karne ke liye

            pageFlip.on('flip', (e) => {
                flipSound.currentTime = 0; // Har flip par awaaz shuru se aaye
                flipSound.play().catch(err => {
                    console.log("Audio browser ne rok di:", err);
                });
            });
        });
    </script>
